name: Deploy The Morning Bloom to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/morning-bloom-gopi-briefing-pg787p
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site directory
        run: |
          mkdir -p _site/editions
          cp index.html archive.html _site/
          cp editions/*.html _site/editions/
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
